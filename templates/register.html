{% extends "base.html" %}
{% block title %}Sign Up — UniVibe{% endblock %}
{% block content %}

<div style="min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 2rem 0; background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);">
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-md-5">
        <!-- Card -->
        <div style="background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 1.5rem; padding: 3rem; box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);">
          
          <!-- Header -->
          <div class="text-center mb-4">
            <div style="font-size: 3rem; font-weight: 700; color: #6c63ff; margin-bottom: 1rem;">UV</div>
            <h1 style="font-size: 2rem; font-weight: 700; color: #ffffff; margin-bottom: 0.5rem;">Join UniVibe</h1>
            <p style="color: rgba(255, 255, 255, 0.6); font-size: 0.95rem;">Create your account and find your people</p>
          </div>

          <!-- Google Sign Up -->
          <button type="button" onclick="handleGoogleSignUp()" style="width: 100%; padding: 0.875rem; background: rgba(255, 255, 255, 0.1); color: white; border: 1px solid rgba(255, 255, 255, 0.2); border-radius: 0.75rem; font-weight: 600; font-size: 0.95rem; cursor: pointer; transition: all 0.3s ease; display: flex; align-items: center; justify-content: center; gap: 0.5rem; margin-bottom: 1.5rem;">
            <i class="bi bi-google"></i> Sign up with Google
          </button>
          <style>
            button[onclick="handleGoogleSignUp()"]:hover {
              background: rgba(255, 255, 255, 0.15);
              border-color: rgba(255, 255, 255, 0.3);
            }
          </style>

          <!-- Divider -->
          <div style="display: flex; align-items: center; gap: 1rem; margin-bottom: 1.5rem;">
            <div style="flex: 1; height: 1px; background: rgba(255, 255, 255, 0.1);"></div>
            <span style="color: rgba(255, 255, 255, 0.5); font-size: 0.85rem;">OR</span>
            <div style="flex: 1; height: 1px; background: rgba(255, 255, 255, 0.1);"></div>
          </div>

          <!-- Email/Password Form -->
          <form method="POST" id="registerForm">
            <!-- Full Name -->
            <div style="margin-bottom: 1.5rem;">
              <label style="display: block; color: #ffffff; font-weight: 600; margin-bottom: 0.5rem; font-size: 0.9rem;">Full Name</label>
              <input type="text" name="full_name" class="form-control" 
                     placeholder="Your name"
                     style="background: rgba(255, 255, 255, 0.1); border: 1px solid rgba(255, 255, 255, 0.2); color: #ffffff; padding: 0.75rem 1rem; border-radius: 0.75rem; font-size: 0.95rem; transition: all 0.3s ease;"
                     required/>
              <style>
                input[type="text"]:focus {
                  background: rgba(255, 255, 255, 0.15);
                  border-color: #6c63ff;
                  outline: none;
                  box-shadow: 0 0 0 3px rgba(108, 99, 255, 0.1);
                }
                input[type="text"]::placeholder {
                  color: rgba(255, 255, 255, 0.4);
                }
              </style>
            </div>

            <!-- Username -->
            <div style="margin-bottom: 1.5rem;">
              <label style="display: block; color: #ffffff; font-weight: 600; margin-bottom: 0.5rem; font-size: 0.9rem;">Username</label>
              <input type="text" name="username" class="form-control" 
                     placeholder="your_username"
                     style="background: rgba(255, 255, 255, 0.1); border: 1px solid rgba(255, 255, 255, 0.2); color: #ffffff; padding: 0.75rem 1rem; border-radius: 0.75rem; font-size: 0.95rem; transition: all 0.3s ease;"
                     required/>
            </div>

            <!-- Email -->
            <div style="margin-bottom: 1.5rem;">
              <label style="display: block; color: #ffffff; font-weight: 600; margin-bottom: 0.5rem; font-size: 0.9rem;">Email Address</label>
              <input type="email" name="email" class="form-control" 
                     placeholder="your@email.com"
                     style="background: rgba(255, 255, 255, 0.1); border: 1px solid rgba(255, 255, 255, 0.2); color: #ffffff; padding: 0.75rem 1rem; border-radius: 0.75rem; font-size: 0.95rem; transition: all 0.3s ease;"
                     required/>
            </div>

            <!-- Password -->
            <div style="margin-bottom: 1.5rem;">
              <label style="display: block; color: #ffffff; font-weight: 600; margin-bottom: 0.5rem; font-size: 0.9rem;">Password</label>
              <input type="password" name="password" class="form-control" 
                     placeholder="••••••••"
                     minlength="6"
                     style="background: rgba(255, 255, 255, 0.1); border: 1px solid rgba(255, 255, 255, 0.2); color: #ffffff; padding: 0.75rem 1rem; border-radius: 0.75rem; font-size: 0.95rem; transition: all 0.3s ease;"
                     required/>
              <small style="color: rgba(255, 255, 255, 0.5); font-size: 0.8rem;">Minimum 6 characters</small>
            </div>

            <!-- Bio (Optional) -->
            <div style="margin-bottom: 2rem;">
              <label style="display: block; color: #ffffff; font-weight: 600; margin-bottom: 0.5rem; font-size: 0.9rem;">Bio <span style="color: rgba(255, 255, 255, 0.5);">(optional)</span></label>
              <textarea name="bio" class="form-control" rows="2"
                        placeholder="Tell us about yourself..."
                        style="background: rgba(255, 255, 255, 0.1); border: 1px solid rgba(255, 255, 255, 0.2); color: #ffffff; padding: 0.75rem 1rem; border-radius: 0.75rem; font-size: 0.95rem; transition: all 0.3s ease; resize: none;"></textarea>
              <style>
                textarea:focus {
                  background: rgba(255, 255, 255, 0.15);
                  border-color: #6c63ff;
                  outline: none;
                  box-shadow: 0 0 0 3px rgba(108, 99, 255, 0.1);
                }
                textarea::placeholder {
                  color: rgba(255, 255, 255, 0.4);
                }
              </style>
            </div>

            <!-- Sign Up Button -->
            <button type="submit" style="width: 100%; padding: 0.875rem; background: linear-gradient(135deg, #6c63ff 0%, #5a52d5 100%); color: white; border: none; border-radius: 0.75rem; font-weight: 600; font-size: 0.95rem; cursor: pointer; transition: all 0.3s ease; margin-bottom: 1.5rem;">
              Create Account
            </button>
            <style>
              button[type="submit"]:hover {
                transform: translateY(-2px);
                box-shadow: 0 8px 20px rgba(108, 99, 255, 0.3);
              }
              button[type="submit"]:active {
                transform: translateY(0);
              }
            </style>
          </form>

          <!-- Footer -->
          <div style="text-align: center; padding-top: 1.5rem; border-top: 1px solid rgba(255, 255, 255, 0.1);">
            <p style="color: rgba(255, 255, 255, 0.6); font-size: 0.9rem;">
              Already have an account? 
              <a href="{{ url_for('login') }}" style="color: #6c63ff; text-decoration: none; font-weight: 600;">Sign in</a>
            </p>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

{% endblock %}

{% block extra_js %}
<script>
// Google Sign-Up with error handling
async function handleGoogleSignUp() {
  try {
    console.log("🔐 Google Sign-Up initiated...");
    
    // Wait for Firebase to be ready
    let attempts = 0;
    while (!window.firebaseAuthEnhanced && attempts < 50) {
      await new Promise(resolve => setTimeout(resolve, 100));
      attempts++;
    }

    if (!window.firebaseAuthEnhanced) {
      showToast('❌ Firebase not initialized. Please refresh the page.', 'error');
      console.error("Firebase Auth Enhanced not available");
      return;
    }

    const result = await window.firebaseAuthEnhanced.signInWithGoogle();
    
    if (result.success) {
      console.log("✅ Google Sign-Up successful");
      showToast('✅ Account created successfully!', 'success');
      setTimeout(() => {
        window.location.href = result.redirect || '/dashboard';
      }, 1000);
    } else {
      console.error("❌ Sign-Up failed:", result.error);
      showToast('❌ ' + result.error, 'error');
    }
  } catch (error) {
    console.error('❌ Sign-up error:', error);
    console.error('Error message:', error.message);
    console.error('Error code:', error.code);
    showToast('❌ Sign-up failed: ' + error.message, 'error');
  }
}
</script>
{% endblock %}
