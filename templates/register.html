<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up - UniVibe</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; font-family: 'DM Sans', sans-serif; }
    .register-container { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); border-radius: 20px; box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3); padding: 50px; width: 100%; max-width: 500px; animation: slideUp 0.6s ease-out; }
    @keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
    .register-header { text-align: center; margin-bottom: 40px; }
    .register-header h1 { font-size: 32px; font-weight: 700; color: #2d3748; margin: 0 0 10px 0; }
    .register-header p { color: #718096; font-size: 14px; margin: 0; }
    .form-group { margin-bottom: 20px; }
    .form-group label { display: block; font-weight: 600; color: #2d3748; margin-bottom: 8px; font-size: 14px; }
    .form-group input, .form-group textarea { width: 100%; padding: 12px 16px; border: 2px solid #e2e8f0; border-radius: 10px; font-size: 14px; font-family: 'DM Sans', sans-serif; transition: all 0.3s ease; box-sizing: border-box; }
    .form-group input:focus, .form-group textarea:focus { outline: none; border-color: #667eea; box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1); }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
    .form-row .form-group { margin-bottom: 0; }
    .register-btn { width: 100%; padding: 14px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; border: none; border-radius: 10px; font-weight: 600; font-size: 16px; cursor: pointer; transition: all 0.3s ease; margin-top: 10px; }
    .register-btn:hover { transform: translateY(-2px); box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3); }
    .divider { display: flex; align-items: center; margin: 30px 0; }
    .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: #e2e8f0; }
    .divider span { padding: 0 15px; font-size: 13px; color: #a0aec0; }
    .google-btn { width: 100%; padding: 12px; background: white; border: 2px solid #e2e8f0; border-radius: 10px; font-weight: 600; font-size: 14px; cursor: pointer; transition: all 0.3s ease; display: flex; align-items: center; justify-content: center; gap: 10px; }
    .google-btn:hover { border-color: #667eea; background: #f7fafc; }
    .login-link { text-align: center; margin-top: 20px; font-size: 14px; color: #718096; }
    .login-link a { color: #667eea; text-decoration: none; font-weight: 600; }
    .error-message { background: #fed7d7; color: #c53030; padding: 12px; border-radius: 8px; margin-bottom: 20px; font-size: 14px; display: none; }
    .error-message.show { display: block; }
    .loading { display: none; text-align: center; color: #667eea; font-size: 14px; }
    .loading.show { display: block; }
    .password-hint { font-size: 12px; color: #a0aec0; margin-top: 5px; }
  </style>
</head>
<body>
  <div class="register-container">
    <div class="register-header">
      <h1>Join UniVibe</h1>
      <p>Find your vibe, find your people</p>
    </div>
    <div class="error-message" id="errorMessage"></div>
    <div class="loading" id="loadingMessage">Creating your account...</div>
    <form id="registerForm">
      <div class="form-row">
        <div class="form-group">
          <label for="fullName">Full Name</label>
          <input type="text" id="fullName" name="fullName" placeholder="John Doe" required>
        </div>
        <div class="form-group">
          <label for="username">Username</label>
          <input type="text" id="username" name="username" placeholder="johndoe" required>
        </div>
      </div>
      <div class="form-group">
        <label for="email">Email Address</label>
        <input type="email" id="email" name="email" placeholder="you@example.com" required>
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" placeholder="••••••••" required>
        <div class="password-hint">Minimum 6 characters</div>
      </div>
      <div class="form-group">
        <label for="bio">Bio (Optional)</label>
        <textarea id="bio" name="bio" placeholder="Tell us about yourself..." rows="3" style="resize: vertical;"></textarea>
      </div>
      <button type="submit" class="register-btn">Create Account</button>
    </form>
    <div class="divider"><span>OR</span></div>
    <button type="button" class="google-btn" id="googleSignUpBtn">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
        <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
        <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
        <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
      </svg>
      <span>Sign up with Google</span>
    </button>
    <div class="login-link">
      Already have an account? <a href="/login">Sign in here</a>
    </div>
  </div>
  <script type="module">
    import { registerWithEmail, signInWithGoogle } from '/static/js/firebase-auth.js';
    const registerForm = document.getElementById('registerForm');
    const googleSignUpBtn = document.getElementById('googleSignUpBtn');
    const errorMessage = document.getElementById('errorMessage');
    const loadingMessage = document.getElementById('loadingMessage');
    registerForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      errorMessage.classList.remove('show');
      loadingMessage.classList.add('show');
      const fullName = document.getElementById('fullName').value;
      const username = document.getElementById('username').value;
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const bio = document.getElementById('bio').value;
      if (password.length < 6) {
        errorMessage.textContent = 'Password must be at least 6 characters';
        errorMessage.classList.add('show');
        loadingMessage.classList.remove('show');
        return;
      }
      const result = await registerWithEmail(email, password, fullName, username, bio);
      if (result.success) {
        window.location.href = '/dashboard';
      } else {
        errorMessage.textContent = result.error;
        errorMessage.classList.add('show');
        loadingMessage.classList.remove('show');
      }
    });
    googleSignUpBtn.addEventListener('click', async () => {
      errorMessage.classList.remove('show');
      loadingMessage.classList.add('show');
      const result = await signInWithGoogle();
      if (result.success) {
        window.location.href = '/dashboard';
      } else {
        errorMessage.textContent = result.error;
        errorMessage.classList.add('show');
        loadingMessage.classList.remove('show');
      }
    });
  </script>
</body>
</html>
